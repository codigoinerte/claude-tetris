<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-container">
  <h1 class="game-title">TETRIS</h1>
  <div class="theme-toggle">
    <span class="theme-label">Dark</span>
    <label class="switch">
      <input type="checkbox" id="theme-toggle" />
      <span class="slider"></span>
    </label>
    <span class="theme-label">Light</span>
  </div>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Game Over overlay -->
    <div id="overlay-gameover" class="overlay hidden">
      <div class="overlay-box">
        <p id="gameover-title">GAME OVER</p>
        <p id="gameover-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <!-- Pause overlay -->
    <div id="overlay-pause" class="overlay hidden">
      <div class="overlay-box">
        <p id="pause-title">PAUSA</p>
        <div class="pause-menu-buttons">
          <button id="resume-btn" class="pause-btn pause-btn-primary">▶ Reanudar</button>
          <button id="restart-from-pause-btn" class="pause-btn pause-btn-secondary">↺ Reiniciar</button>
          <button id="toggle-controls-btn" class="pause-btn pause-btn-secondary">⌨ Ver controles</button>
        </div>
        <ul id="pause-controls-list" class="pause-controls-list">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>
        <div class="pause-level-row">
          <label for="start-level-select">Nivel inicial:</label>
          <select id="start-level-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
          </select>
        </div>
      </div>
    </div>
  </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
