<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-container">
  <h1 class="game-title">TETRIS</h1>
  <div class="theme-toggle">
    <span class="theme-label">Dark</span>
    <label class="switch">
      <input type="checkbox" id="theme-toggle" />
      <span class="slider"></span>
    </label>
    <span class="theme-label">Light</span>
  </div>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">RÉCORDS</span>
          <div id="leaderboard-side"></div>
          <button id="reset-scores-btn">Reset</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="name-input-row" class="name-input-row" style="display:none;">
          <input type="text" id="player-name" placeholder="Tu nombre" maxlength="16" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <div id="leaderboard"></div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
